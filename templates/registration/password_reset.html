{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-container">

    <!-- floating petals -->
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="auth-card">

        <div class="auth-header">
            <h1>Reset Your Password</h1>
            <p class="auth-subtitle">Enter your email and we’ll send you a reset link</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>

            <button type="submit" class="btn-primary btn-small">
                Send Reset Link
            </button>

        </form>

        <div class="auth-footer" style="text-align:center; margin-top:20px;">
            <a href="{% url 'login' %}" class="link-secondary">Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
