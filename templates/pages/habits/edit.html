{% extends "base.html" %}

{% block title %}Edit Habit{% endblock %}

{% block content %}
<div class="container container-narrow">
  <div class="page-header">
    <h1>Edit Habit</h1>
    <a class="btn btn-ghost" href="{% url 'habits_manage' %}">← Back</a>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Name</label>
        {{ form.name }}
      </div>
      <div class="form-group">
        <label class="form-label">Intention (optional)</label>
        {{ form.intention }}
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          {{ form.is_active }}
          <span>Active</span>
        </label>
      </div>
      <button class="btn btn-primary" type="submit">Save</button>
    </form>
  </div>
</div>
{% endblock %}
