{% extends "base.html" %}

{% block title %}Habit Reflection{% endblock %}

{% block content %}
<div class="container container-narrow">
  <div class="page-header">
    <h1>Reflection</h1>
    <p class="text-muted">{{ log.habit.name }} · {{ log.date }}</p>
    <a class="btn btn-ghost" href="{% url 'habits_today' %}">← Back</a>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">What did you notice?</label>
        {{ form.reflection }}
      </div>
      <button class="btn btn-primary" type="submit">Save reflection</button>
    </form>
  </div>
</div>
{% endblock %}
